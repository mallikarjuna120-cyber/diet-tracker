name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: diet-tracker/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r26c

      - name: Install dependencies
        run: npm ci
        working-directory: ./diet-tracker

      - name: Build web app
        run: npm run build
        working-directory: ./diet-tracker

      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: ./diet-tracker

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        working-directory: ./diet-tracker

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: diet-tracker-debug-apk
          path: diet-tracker/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
